# NexT 主题自定义配置
# 此文件用于覆盖 themes/next/_config.yml 的默认配置

# 头像配置
avatar:
  url: /images/avatar.png
  rounded: true
  rotated: true

# 社交链接
social:
  GitHub: https://github.com/leemeng0x61 || fab fa-github
  E-Mail: mailto:mengqicheng@163.com || fa fa-envelope
  RSS: /atom.xml || fa fa-rss

social_icons:
  enable: true
  icons_only: false
  transition: false

# 代码复制按钮
codeblock:
  copy_button:
    enable: true
    style: mac
  language: true

# MathJax 数学公式
math:
  every_page: false
  mathjax:
    enable: true
    tags: ams

# 本地搜索
local_search:
  enable: true
  top_n_per_article: 5
  unescape: true
  preload: true

# 字数统计
symbols_count_time:
  separated_meta: true
  item_text_total: true

# 不蒜子阅读统计
busuanzi_count:
  enable: true
  total_visitors: true
  total_visitors_icon: fa fa-user
  total_views: true
  total_views_icon: fa fa-eye
  post_views: true
  post_views_icon: far fa-eye

# Utterances 评论系统
comments:
  style: tabs
  active: utterances
  storage: true

utterances:
  enable: true
  repo: leemeng0x61/leemeng0x61.github.io
  issue_term: pathname
  theme: github-light
