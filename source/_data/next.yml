# NexT 主题自定义配置
# 此文件覆盖 themes/next/_config.yml 的默认配置

# 站点优化
minify: true

# 暗黑模式
darkmode: true
lightdark:
  enable: true
  check_supports: true

# Favicon
favicon:
  small: /images/favicon.png
  medium: /images/favicon.png
  apple_touch_icon: /images/favicon.png
  safari_pinned_tab: /images/favicon.png

# 头像配置
avatar:
  url: /images/photo.jpg
  rounded: true
  rotated: false

# 社交链接
social:
  GitHub: https://github.com/leemeng0x61 || fab fa-github
  E-Mail: mailto:leemeng0x61@gmail.com || fa fa-envelope
  RSS: /atom.xml || fa fa-rss

social_icons:
  enable: true
  icons_only: false
  transition: false

# 页脚订阅
follow_me:
  RSS: /atom.xml || fa fa-rss
  GitHub: https://github.com/leemeng0x61 || fab fa-github

# 代码复制按钮
codeblock:
  copy_button:
    enable: true
    style: mac
  language: true

# 阅读进度条
reading_progress:
  enable: true
  start_at: left
  position: top
  reversed: false
  color: "#37c6c0"
  height: 3px

# MathJax 数学公式
math:
  every_page: false
  mathjax:
    enable: true
    tags: ams

# 图片懒加载
lazyload: true

# 本地搜索
local_search:
  enable: true
  top_n_per_article: 5
  unescape: false
  preload: false

# 字数统计
symbols_count_time:
  separated_meta: true
  item_text_total: true

# 不蒜子阅读统计
busuanzi_count:
  enable: true
  total_visitors: true
  total_visitors_icon: fa fa-user
  total_views: true
  total_views_icon: fa fa-eye
  post_views: true
  post_views_icon: far fa-eye

# Utterances 评论系统
comments:
  style: tabs
  active: utterances
  storage: true

utterances:
  enable: true
  repo: leemeng0x61/leemeng0x61.github.io
  issue_term: pathname
  theme: preferred-color-scheme
